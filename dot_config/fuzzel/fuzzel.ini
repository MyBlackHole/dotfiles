# Fuzzel 配置 — Dracula 毛玻璃风格
# Compositor: niri

# === 字体 ===
# 主字体: CaskaydiaCove Nerd Font Mono, Fallback: Noto Sans CJK SC
font=CaskaydiaCove Nerd Font Mono:size=12, Noto Sans CJK SC:size=12

# === 外观 ===
anchor=center
width=35
lines=12
horizontal-pad=40
vertical-pad=8
inner-pad=6

prompt=❯
message-mode=wrap
match-mode=fzf
sort-result=yes

# === 图标 ===
icons-enabled=yes
icon-theme=Tela-circle-dracula
image-size-ratio=0.5

# === 颜色 (Catppuccin Mocha 调色) ===
[colors]
# 背景 — 深紫黑 75% 不透明（毛玻璃效果需 compositor 配合）
background=1e1e2ebf

# 普通文字
text=cdd6f4ff

# 提示消息文字
message=6c7086ff

# 提示符 (❯)
prompt=89b4faff

# 占位符文字
placeholder=585b70ff

# 用户输入的文字
input=cdd6f4ff

# 模糊匹配高亮色 — 粉色
match=f5c2e7ff

# 选中条目背景
selection=45475aff

# 选中条目文字
selection-text=cdd6f4ff

# 选中条目中的匹配高亮
selection-match=f5c2e7ff

# 匹配计数器
counter=6c7086ff

# 边框颜色 — 淡紫
border=b4befeef

# === 边框 ===
[border]
width=2
radius=16
