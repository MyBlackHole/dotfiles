# Fuzzel — clipcat 剪贴板历史
# Catppuccin Mocha · 净版

font=CaskaydiaCove Nerd Font Mono:size=11, Noto Sans CJK SC:size=11
use-bold=yes

anchor=center
width=75
lines=15
minimal-lines=yes
horizontal-pad=20
vertical-pad=10
inner-pad=4
line-height=18
letter-spacing=0

prompt=❯
placeholder=Search...
message-mode=wrap
match-mode=fzf
sort-result=yes
match-counter=yes

[colors]
background=1e1e2edd
text=cdd6f4ff
prompt=89b4faff
input=cdd6f4ff
placeholder=585b70ff
message=6c7086ff
match=f5c2e7ff
selection=313244ff
selection-text=cdd6f4ff
selection-match=cba6f7ff
counter=585b70ff
border=313244ff

[border]
width=1
radius=10
selection-radius=4

[dmenu]
exit-immediately-if-empty=yes
